<div class="feature-user">
  <div class="feature-form">
    <h3>Ajouter une facture</h3>

    <form [formGroup]="createFactureForm" (ngSubmit)="onSubmit()">
      <label for="">Nom de la facture</label>
      <input type="text" formControlName="nom" />

      <label for="">Date de la facture</label>
      <input
        type="date"
        formControlName="date_facture"
        name="dateFacture"
        id="dateFacture"
        class="custom-picker"
      />

      <label for="">Montant</label>
      <input type="number" name="" id="" formControlName="montant" />

      <button>{{ editingFactureId ? "Modifier" : "Ajouter" }}</button>
    </form>
  </div>

  <div class="feature-list">
    <table>
      <tr>
        <th>ID</th>
        <th>Nom de la facture</th>
        <th>Date de la facture</th>
        <th>Montant</th>
        <th></th>
      </tr>
      <tr *ngFor="let f of factures">
        <td>{{ f.id_facture }}</td>
        <td>{{ f.nom }}</td>
        <td>{{ f.date_facture }}</td>
        <td>{{ f.montant }} Ariary</td>
        <td>
          <Button (click)="onModifyClick(f)">Modifier</Button>
          <Button (click)="showingModal(f)">Supprimer</Button>
        </td>
      </tr>
    </table>
  </div>

  <div class="delete-modal" *ngIf="showModal">
    <div class="modal-content">
      <p>Êtes-vous sûr de vouloir supprimer cette facture ?</p>
      <div class="modal-actions">
        <button (click)="confirmDelete()">Oui</button>
        <button (click)="showModal = false">Non</button>
      </div>
    </div>
  </div>

</div>

<div class="logout-container">
  <button class="btn-logout" (click)="logout()">
    <span>Déconnexion</span>
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
      <polyline points="16 17 21 12 16 7"></polyline>
      <line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
  </button>
</div>
