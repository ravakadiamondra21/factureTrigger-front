<div class="feature-login">
  <p>Authentification User</p>

  <form
    action=""
    class="feature-form"
    [formGroup]="loginUserForm"
    (ngSubmit)="onSubmit()"
  >
    <input type="text" placeholder="E-mail" formControlName="userEmail" />
    <input
      type="password"
      placeholder="Mot de passe"
      formControlName="password"
    />
    <button type="submit">Entrer</button>
  </form>
</div>
